# Kitty terminal configuration
# Equivalent to gnome-terminal-config and xfce4-terminal-config settings

# Required for set-colour-theme integration via `kitty @` commands
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

# Font - family and size from libfonts.sh, which varies per host
geninclude kitty-font.sh

# Cursor - matches gnome-terminal/xfce4-terminal block cursor with blink
cursor_shape     block
cursor_blink_interval 0.5

# Bell - matches xfce4-terminal misc-bell-urgent
enable_audio_bell no
window_alert_on_bell yes

# Window size - matches gnome-terminal default-size 120x40
remember_window_size no
initial_window_width 120c
initial_window_height 40c

# Scrollback
scrollback_lines 10000

# No scrollbar (matches gnome-terminal scrollbar-policy='never'
# and xfce4-terminal scrolling-bar TERMINAL_SCROLLBAR_NONE)
# kitty has no scrollbar by default, so nothing to configure

# Note: kitty has no bold_is_bright equivalent. It always renders bold
# text using the bold font variant, and bright colors (8-15) are
# separate. This is the correct modern behavior vs. the legacy VT100
# conflation of bold and bright that gnome-terminal/xfce4-terminal
# support via their bold-is-bright options.

# Word selection characters - match xfce4-terminal's word-chars (A-Za-z0-9_@~/)
select_by_word_characters @_~/

# Smaller font size steps when zooming (default is 2.0)
map kitty_mod+equal change_font_size all +1.0
map kitty_mod+plus change_font_size all +1.0
map kitty_mod+kp_add change_font_size all +1.0
map kitty_mod+minus change_font_size all -1.0
map kitty_mod+kp_subtract change_font_size all -1.0

# Zoom font whilst preserving rows/cols (window resizes to compensate)
map ctrl+shift+alt+equal launch --type=background kitty-zoom +1.0
map ctrl+shift+alt+minus launch --type=background kitty-zoom -1.0

# UK keyboard layout fix for window switching:
#
# keyd remaps at the evdev layer:
#   shift+2 -> " (UK layout), so ctrl+shift+2 is emitted as ctrl+shift+apostrophe
#                (since " = shift+' on US), giving kitty ev.key=39 (')
#   shift+' -> @ (UK layout), so ctrl+shift+' is emitted as ctrl+shift+2
#                (since @ = shift+2 on US), giving kitty ev.key=50 (2)
#
# Result: kitty's default ctrl+shift+2 binding fires on ctrl+shift+' (physical),
# and ctrl+shift+2 (physical) has no binding.
#
# Fix: unmap the default and rebind to the physical key that actually arrives.
map ctrl+shift+2 no_op
map ctrl+shift+' second_window  #' fix emacs font-lock

# Toggle stack layout (zoom active pane to fill the OS window, like tmux zoom)
map ctrl+shift+z toggle_layout stack

map ctrl+shift+left neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up neighboring_window up
map ctrl+shift+down neighboring_window down
# map shift+left move_window right
# map shift+down move_window up

# Disable confirm on close (less annoying for automation)
confirm_os_window_close 0

# Window borders - thicker border around the active pane for clarity.
# draw_minimal_borders no ensures all four edges are drawn, not just the
# shared edge between panes (which makes it hard to tell which is active).
window_border_width 2pt
draw_minimal_borders no
window_padding_width 3
# active_border_color defaults to dark theme here; inactive_border_color is NOT
# set here as it must match the theme background — kitty-theme-config sets both.
active_border_color #00bfff

# Theme - managed by bin/kitty-theme-config
# current-theme.conf lives in ~/.config/kitty/ (not in the repo).
# Use an absolute path since kitty.conf is stow-symlinked from the repo.
include ${HOME}/.config/kitty/current-theme.conf
