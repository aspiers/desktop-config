# Prevent BT earbud/headphone loopback mics from autoselecting as the
# default source.  See demote-bt-loopback-source.lua for details.

wireplumber.components = [
  {
    name = demote-bt-loopback-source.lua, type = script/lua
    provides = custom.demote-bt-loopback-source
  }
]

wireplumber.profiles = {
  main = {
    custom.demote-bt-loopback-source = required
  }
}
