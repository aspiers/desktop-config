# Audio device priority configuration
#
# Priorities (sinks):   Sony WH-1000XM6 (1200) > other BT sinks (1100) > KT_USB_AUDIO (1000) > built-in (700) > HDMI (500) > GoMic sink (400)
# Priorities (sources): GoMic mic (1400) > USB mic (1200) > webcam mic (1100) > built-in stereo mic (800) > built-in digital mic (700)
#
# WirePlumber's find-best-default-node.lua uses priority.session to select
# the default sink/source when no explicit user preference is stored.
#
# Generic category rules go here (monitor.alsa.rules + monitor.bluez.rules).
# Device-specific overrides for ACP-managed nodes (GoMic, webcam) go in
# ~/.config/pipewire/pipewire.conf.d/50-audio-priorities.conf via node.rules,
# which applies server-side to all nodes regardless of creation path.
#
# Regex syntax is POSIX ERE (see regex(7)).  The ~ prefix signals a regex.
#
# Note: the ALSA monitor docs warn against priority.session > 1500 on sinks,
# as values that high may cause a sink's monitor port to be selected as the
# default source.

monitor.alsa.rules = [
  # Set ALL ALSA nodes to a base priority of 700 first, then override
  # per-category below.  This catches everything including HDMI.
  {
    matches = [
      { node.name = "~alsa_.*" }
    ]
    actions = {
      update-props = {
        priority.session = 700
      }
    }
  }

  # USB audio sinks: highest priority among sinks.
  # Only applies to sinks (playback) to avoid promoting sink monitor ports
  # above real microphone sources (monitors inherit the sink's priority).
  {
    matches = [
      { alsa.driver_name = "snd_usb_audio"  media.class = "Audio/Sink" }
    ]
    actions = {
      update-props = {
        priority.session = 1000
      }
    }
  }

  # USB audio sources: well below the native source range (~1600-2000)
  # so that sink monitor ports (which inherit priority.session) don't
  # beat real microphones.
  {
    matches = [
      { alsa.driver_name = "snd_usb_audio"  media.class = "Audio/Source" }
    ]
    actions = {
      update-props = {
        priority.session = 1200
      }
    }
  }

  # HDMI / DisplayPort outputs: lowest priority among sinks.
  # When USB disconnects, fallback should be built-in speaker, not HDMI.
  {
    matches = [
      { alsa.id = "~HDMI.*" }
      { alsa.id = "~DisplayPort.*" }
    ]
    actions = {
      update-props = {
        priority.session = 500
      }
    }
  }

  # Internal Stereo Mic: above the speaker monitor (which inherits 700).
  # Must be here in monitor.alsa.rules, not monitor.bluez.rules, to match.
  {
    matches = [
      { alsa.card_name = "HD-Audio Generic"  api.alsa.pcm.stream = "capture" }
    ]
    actions = {
      update-props = {
        priority.session = 800
      }
    }
  }
]

# Disable saving/restoring the last-used default sink/source.
# Without this, any explicit wpctl set-default (or accidental selection) gets
# persisted and overrides the priority system on every subsequent boot.
# With this disabled, WirePlumber always picks by priority.session on startup.
wireplumber.settings = {
  node.restore-default-targets = false
}

# Bluetooth sink priorities: all BT sinks above KT_USB_AUDIO (1000),
# with Sony WH-1000XM6 highest of all.
monitor.bluez.rules = [
  # Generic Bluetooth sinks: above USB DAC.
  {
    matches = [
      { node.name = "~bluez_output.*" }
    ]
    actions = {
      update-props = {
        priority.session = 1100
      }
    }
  }

  # Sony WH-1000XM6: highest priority sink.
  {
    matches = [
      { node.name = "~bluez_output.*"  node.description = "WH-1000XM6" }
    ]
    actions = {
      update-props = {
        priority.session = 1200
      }
    }
  }

  # Bluetooth sources (microphones): below dedicated mics, above built-in.
  {
    matches = [
      { node.name = "~bluez_input.*" }
    ]
    actions = {
      update-props = {
        priority.session = 900
      }
    }
  }
]
