# Audio device priority configuration (PipeWire node.rules)
#
# These rules apply at the PipeWire level to ALL nodes, including those
# created by ACP-managed devices which bypass WirePlumber's monitor.alsa.rules.
#
# Priorities (sinks):  USB DAC (1000) > Bluetooth (900) > built-in (700) > HDMI (500) > GoMic sink (400)
# Priorities (sources): Wireless Mic (1500) > GoMic (1400) > USB sources (1200) > webcam mic (1100) > built-in mics (800)
#
# Note: Bluetooth earbud/headphone loopback source nodes (bluez_input.*)
# have object.register=false and a hardcoded priority of 2010 set in
# bluez.lua.  Neither node.rules here nor monitor.bluez.rules can override
# them.  The fix is a WirePlumber event hook; see
# demote-bt-loopback-source.lua and 60-demote-bt-loopback-source.conf.
#
# Regex syntax: ~ prefix enables POSIX ERE matching.

node.rules = [
  # GoMic sink: headphone monitoring jack, never a useful default sink.
  {
    matches = [
      { alsa.card_name = "Samson GoMic"  api.alsa.pcm.stream = "playback" }
    ]
    actions = {
      update-props = { priority.session = 400 }
    }
  }

  # Wireless Microphone: top priority source (e.g. Hollyland).
  {
    matches = [
      { alsa.card_name = "Wireless Microphone" }
    ]
    actions = {
      update-props = { priority.session = 1500 }
    }
  }

  # GoMic source: preferred dedicated microphone.
  {
    matches = [
      { alsa.card_name = "Samson GoMic"  api.alsa.pcm.stream = "capture" }
    ]
    actions = {
      update-props = { priority.session = 1400 }
    }
  }

  # Webcam mic: below dedicated mic, above built-in mics.
  {
    matches = [
      { alsa.card_name = "HD Pro Webcam C920"  api.alsa.pcm.stream = "capture" }
    ]
    actions = {
      update-props = { priority.session = 1100 }
    }
  }

]
